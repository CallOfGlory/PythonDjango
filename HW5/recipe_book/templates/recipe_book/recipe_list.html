<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Книга рецептів</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .btn { padding: 10px 20px; background-color: #FF6347; color: white; border: none; cursor: pointer; text-decoration: none; display: inline-block; margin: 10px 0; border-radius: 4px; }
        .btn:hover { background-color: #E5533D; }
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .recipe-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; background-color: #f9f9f9; }
        .recipe-card h3 { margin-top: 0; color: #FF6347; }
        .recipe-card p { color: #666; }
        .recipe-actions { margin-top: 10px; }
        .btn-small { padding: 5px 10px; font-size: 0.9em; margin-right: 5px; }
    </style>
</head>
<body>
    <h1>Книга рецептів</h1>
    <a href="{% url 'add_recipe' %}" class="btn">Додати новий рецепт</a>

    {% if recipes %}
    <div class="recipe-grid">
        {% for recipe in recipes %}
        <div class="recipe-card">
            <h3>{{ recipe.name }}</h3>
            <p>{{ recipe.description|truncatewords:20 }}</p>
            <div class="recipe-actions">
                <a href="{% url 'recipe_detail' recipe.id %}" class="btn btn-small">Переглянути</a>
                <a href="{% url 'edit_recipe' recipe.id %}" class="btn btn-small">Редагувати</a>
                <a href="{% url 'delete_recipe' recipe.id %}" class="btn btn-small" onclick="return confirm('Видалити рецепт?')" style="background-color: #f44336;">Видалити</a>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p>Рецептів поки немає. Додайте перший рецепт!</p>
    {% endif %}
</body>
</html>
