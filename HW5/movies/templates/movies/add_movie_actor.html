<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Додати актора до фільму</title>
</head>
<body>
    <h1>Додати актора до фільму "{{ movie.title }}"</h1>
    <form method="post">
        {% csrf_token %}
        <p>
            <label>Виберіть актора:</label><br>
            <select name="actor_id" required>
                <option value="">-- Оберіть актора --</option>
                {% for actor in actors %}
                <option value="{{ actor.id }}">{{ actor.full_name }}</option>
                {% endfor %}
            </select>
        </p>
        <p>
            <label>Роль:</label><br>
            <input type="text" name="role" required>
        </p>
        <button type="submit">Додати</button>
        <a href="{% url 'movie_full_info' movie.id %}">Скасувати</a>
    </form>
</body>
</html>
