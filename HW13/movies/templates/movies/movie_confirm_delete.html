{% extends 'movies/base.html' %}

{% block title %}Видалити {{ movie.title }}{% endblock %}

{% block content %}
    <h1>Видалити фільм?</h1>
    <div class="form-card">
        <p>Ви впевнені, що хочете видалити фільм <strong>«{{ movie.title }}»</strong>?</p>
        <form method="post" class="form-actions">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Так, видалити</button>
            <a class="btn btn-secondary" href="{% url 'movie_detail' movie.pk %}">Скасувати</a>
        </form>
    </div>
{% endblock %}
