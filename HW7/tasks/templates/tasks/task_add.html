<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Додати завдання</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 500px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        textarea { min-height: 100px; }
        .btn { padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; }
        .btn-secondary { background: #6c757d; color: white; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <h1>Додати нове завдання</h1>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="title">Заголовок завдання:</label>
            <input type="text" id="title" name="title" required>
        </div>

        <div class="form-group">
            <label for="description">Опис завдання:</label>
            <textarea id="description" name="description" required></textarea>
        </div>

        <div class="form-group">
            <label for="start_date">Дата початку:</label>
            <input type="datetime-local" id="start_date" name="start_date" required>
        </div>

        <div class="form-group">
            <label for="end_date">Дата завершення:</label>
            <input type="datetime-local" id="end_date" name="end_date" required>
        </div>

        <button type="submit" class="btn btn-primary">Зберегти</button>
        <a href="{% url 'task_list' %}" class="btn btn-secondary">Скасувати</a>
    </form>
</body>
</html>
