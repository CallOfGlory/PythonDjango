<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список завдань</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .task { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .task h3 { margin: 0 0 10px 0; }
        .task-meta { color: #666; font-size: 0.9em; }
        .btn { padding: 8px 15px; text-decoration: none; border-radius: 3px; display: inline-block; margin: 5px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
    </style>
</head>
<body>
    <h1>Список завдань</h1>
    <a href="{% url 'task_add' %}" class="btn btn-primary">Додати нове завдання</a>

    {% if tasks %}
        {% for task in tasks %}
        <div class="task">
            <h3>{{ task.title }}</h3>
            <p>{{ task.description }}</p>
            <div class="task-meta">
                <strong>Початок:</strong> {{ task.start_date|date:"d.m.Y H:i" }}<br>
                <strong>Завершення:</strong> {{ task.end_date|date:"d.m.Y H:i" }}
            </div>
            <a href="{% url 'task_delete' task.id %}" class="btn btn-danger"
               onclick="return confirm('Ви впевнені, що хочете видалити це завдання?')">Видалити</a>
        </div>
        {% endfor %}
    {% else %}
        <p>Немає завдань. Додайте перше!</p>
    {% endif %}
</body>
</html>
